<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="7" fill="#001a40"/>
  <!-- Radar rings emanating from top-left -->
  <circle cx="3" cy="3" r="10"  fill="none" stroke="#4a8be0" stroke-width="1.4" opacity="0.55" clip-path="url(#q)"/>
  <circle cx="3" cy="3" r="17"  fill="none" stroke="#4a8be0" stroke-width="1.4" opacity="0.38" clip-path="url(#q)"/>
  <circle cx="3" cy="3" r="24"  fill="none" stroke="#4a8be0" stroke-width="1.4" opacity="0.22" clip-path="url(#q)"/>
  <circle cx="3" cy="3" r="31"  fill="none" stroke="#4a8be0" stroke-width="1.4" opacity="0.12" clip-path="url(#q)"/>
  <!-- Sweep line -->
  <line x1="3" y1="3" x2="28" y2="20" stroke="#4a8be0" stroke-width="1" opacity="0.45"/>
  <!-- Signal blip -->
  <circle cx="21" cy="9" r="2.2" fill="#7ab4ff" opacity="0.95"/>
  <!-- Clip to rounded rect -->
  <clipPath id="q">
    <rect width="32" height="32" rx="7"/>
  </clipPath>
</svg>
