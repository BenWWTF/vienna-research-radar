<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Database — Vienna Research Radar</title>
  <meta name="description" content="Searchable database of peer-reviewed outputs from Vienna's research institutions since 1 January 2026.">
      <!-- Favicon -->
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #070d18;
      --surface:  #0d1a2c;
      --surface2: #12233a;
      --fg:       #dce6f5;
      --muted:    #5d7190;
      --meta:     #36506a;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.13);
      --accent:   #2a7ef5;
      --font:     'Source Sans 3', -apple-system, system-ui, sans-serif;
      --mono:     'JetBrains Mono', ui-monospace, monospace;
      --ease:     cubic-bezier(0.22, 1, 0.36, 1);
      --sidebar:  280px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    body {
      background: var(--bg); color: var(--fg);
      font-family: var(--font); font-size: 14px;
      line-height: 1.6; -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3 { margin: 0; line-height: 1.2; }
    p { margin: 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { cursor: pointer; border: none; font: inherit; }

    /* ─── Top nav ──────────────────────────────────────────────── */
    .topnav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,13,24,0.95);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 50px;
      display: flex; align-items: center; gap: 20px;
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); transition: color 120ms;
      text-decoration: none; flex-shrink: 0;
    }
    .nav-back:hover { color: var(--fg); text-decoration: none; }
    .nav-divider { width: 1px; height: 16px; background: var(--border2); flex-shrink: 0; }
    .nav-title {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--muted); flex: 1;
    }
    .nav-count {
      font-family: var(--mono); font-size: 11px; color: var(--meta);
    }
    #totalCount { color: var(--fg); font-weight: 500; }

    /* ─── Layout ────────────────────────────────────────────────── */
    .shell {
      display: flex; min-height: calc(100vh - 50px);
    }

    /* ─── Sidebar ───────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar); flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: sticky; top: 50px; height: calc(100vh - 50px);
      overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 0;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--meta); border-radius: 2px; }

    .search-wrap {
      position: relative; margin-bottom: 20px;
    }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #searchInput {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border2); border-radius: 6px;
      padding: 8px 10px 8px 32px;
      color: var(--fg); font-family: var(--font); font-size: 13px;
      outline: none; transition: border-color 150ms;
    }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--meta); }

    .filter-group { margin-bottom: 20px; }
    .filter-label {
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--meta);
      margin-bottom: 8px; display: block;
    }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip {
      padding: 4px 10px; border-radius: 99px;
      border: 1px solid var(--border2);
      background: transparent; color: var(--muted);
      font-size: 12px; cursor: pointer;
      transition: background 130ms, border-color 130ms, color 130ms;
    }
    .chip:hover { border-color: rgba(255,255,255,0.22); color: var(--fg); }
    .chip.active {
      background: rgba(42,126,245,0.18);
      border-color: rgba(42,126,245,0.5);
      color: #6eb4ff;
    }

    .oa-dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; margin-right: 4px; vertical-align: middle;
    }

    .reset-btn {
      margin-top: auto; padding-top: 16px;
      background: none; color: var(--meta);
      font-size: 12px; font-family: var(--font);
      display: flex; align-items: center; gap: 5px;
      transition: color 120ms;
    }
    .reset-btn:hover { color: var(--fg); }

    /* ─── Main area ─────────────────────────────────────────────── */
    .main {
      flex: 1; min-width: 0;
      padding: 24px 28px;
    }

    /* ─── Stats bar ──────────────────────────────────────────────── */
    .stats-bar {
      display: flex; gap: 20px; margin-bottom: 20px;
      padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val {
      font-family: var(--mono); font-size: 22px; font-weight: 500;
      color: var(--fg); line-height: 1; letter-spacing: -0.02em;
    }
    .stat-label { font-size: 11px; color: var(--muted); }

    /* ─── Sort / view controls ───────────────────────────────────── */
    .controls {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 12px;
    }
    .results-label { font-size: 12px; color: var(--muted); }
    #filteredCount { color: var(--fg); font-weight: 600; }
    .sort-select {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 5px; padding: 5px 10px;
      color: var(--muted); font-family: var(--font); font-size: 12px;
      outline: none; cursor: pointer;
    }
    .sort-select:focus { border-color: var(--accent); }

    /* ─── Results list ───────────────────────────────────────────── */
    #resultsList { display: flex; flex-direction: column; gap: 1px; }

    .paper {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; padding: 16px 18px;
      display: grid; grid-template-columns: 1fr auto;
      gap: 8px 16px; align-items: start;
      transition: border-color 150ms, background 150ms;
      margin-bottom: 6px;
    }
    .paper:hover { border-color: var(--border2); background: var(--surface2); }

    .paper-title {
      font-size: 14px; font-weight: 600; color: var(--fg);
      line-height: 1.4; grid-column: 1;
    }
    .paper-title a { color: inherit; text-decoration: none; }
    .paper-title a:hover { color: #6eb4ff; text-decoration: none; }

    .paper-meta {
      grid-column: 1; display: flex; flex-wrap: wrap;
      align-items: center; gap: 6px; margin-top: 4px;
    }
    .paper-journal {
      font-size: 12px; color: var(--muted); font-style: italic;
    }
    .sep { color: var(--meta); font-size: 10px; }
    .paper-date { font-family: var(--mono); font-size: 11px; color: var(--meta); }
    .paper-domain-tag {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em;
      color: var(--meta); text-transform: uppercase;
    }

    .paper-authors {
      grid-column: 1; font-size: 12px; color: var(--muted);
      margin-top: 3px; line-height: 1.5;
    }
    .vienna-author {
      color: #6eb4ff; font-weight: 600; font-style: normal;
    }

    .paper-abstract {
      grid-column: 1; font-size: 13px; color: var(--muted);
      line-height: 1.55; margin-top: 6px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden; cursor: pointer;
      transition: color 120ms;
    }
    .paper-abstract.expanded {
      display: block; -webkit-line-clamp: unset;
    }
    .paper-abstract:hover { color: var(--fg); }

    .paper-badges { grid-column: 2; grid-row: 1 / span 2; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; min-width: 70px; }
    .oa-badge {
      padding: 2px 8px; border-radius: 99px; font-size: 10px;
      font-family: var(--mono); font-weight: 500; text-transform: lowercase;
      display: flex; align-items: center; gap: 4px; white-space: nowrap;
    }
    .oa-gold    { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.25); }
    .oa-diamond { background: rgba(45,212,191,0.12); color: #2dd4bf; border: 1px solid rgba(45,212,191,0.25); }
    .oa-green   { background: rgba(34,197,94,0.12);  color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
    .oa-hybrid  { background: rgba(167,139,250,0.12);color: #a78bfa; border: 1px solid rgba(167,139,250,0.25); }
    .oa-closed  { background: rgba(100,116,139,0.12);color: #64748b; border: 1px solid rgba(100,116,139,0.25); }

    .type-badge {
      padding: 2px 8px; border-radius: 4px; font-size: 10px;
      font-family: var(--mono); color: var(--meta);
      border: 1px solid var(--border); background: transparent;
      white-space: nowrap;
    }
    .type-dataset   { color: #60a5fa; border-color: rgba(96,165,250,0.3); }
    .type-preprint  { color: #c084fc; border-color: rgba(192,132,252,0.3); }
    .type-article   { color: var(--meta); }

    .doi-link {
      font-family: var(--mono); font-size: 10px; color: var(--meta);
      transition: color 120ms; white-space: nowrap;
    }
    .doi-link:hover { color: var(--accent); text-decoration: none; }
    .doi-link::before { content: "→ "; }

    /* ─── Empty state ────────────────────────────────────────────── */
    .empty {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--fg); margin-bottom: 8px; }

    /* ─── Pagination ─────────────────────────────────────────────── */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-top: 28px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .page-btn {
      padding: 5px 12px; border-radius: 5px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-family: var(--font);
      transition: background 120ms, border-color 120ms, color 120ms;
    }
    .page-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--border2); color: var(--fg); }
    .page-btn.active { background: rgba(42,126,245,0.15); border-color: rgba(42,126,245,0.4); color: #6eb4ff; }
    .page-btn:disabled { opacity: 0.3; cursor: default; }

    /* ─── Footer ─────────────────────────────────────────────────── */
    .footer {
      background: #030810; color: rgba(255,255,255,0.22);
      padding: 20px 28px;
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.07em;
      text-transform: uppercase; border-top: 1px solid var(--border);
    }
    .footer a { color: rgba(255,255,255,0.22); transition: color 120ms; }
    .footer a:hover { color: rgba(255,255,255,0.6); text-decoration: none; }

    @media (max-width: 760px) {
      :root { --sidebar: 100%; }
      .shell { flex-direction: column; }
      .sidebar { position: static; width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
      .topnav { padding: 0 16px; }
      .main { padding: 16px; }
      .stats-bar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<nav class="topnav" aria-label="Site navigation">
  <a class="nav-back" href="index.html">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor"
         stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 3L5 8l5 5"/>
    </svg>
    Home
  </a>
  <div class="nav-divider" aria-hidden="true"></div>
  <span class="nav-title">Research Database</span>
  <span class="nav-count"><span id="totalCount">—</span> entries since 1 Jan 2026</span>
</nav>

<div class="shell">

  <!-- ─── Sidebar ───────────────────────────────────────────────── -->
  <aside class="sidebar" aria-label="Filters">

    <div class="search-wrap">
      <svg class="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none"
           stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="6.5" cy="6.5" r="4"/><path d="M11 11l3 3"/>
      </svg>
      <input id="searchInput" type="search" placeholder="Search titles, authors, abstracts…"
             autocomplete="off" aria-label="Search papers">
    </div>

    <div class="filter-group" id="domainGroup">
      <span class="filter-label">Domain</span>
      <div class="filter-chips" id="domainChips"></div>
    </div>

    <div class="filter-group" id="institutionGroup">
      <span class="filter-label">Institution</span>
      <div class="filter-chips" id="institutionChips"></div>
    </div>

    <div class="filter-group" id="oaGroup">
      <span class="filter-label">Open access</span>
      <div class="filter-chips" id="oaChips"></div>
    </div>

    <div class="filter-group" id="typeGroup">
      <span class="filter-label">Output type</span>
      <div class="filter-chips" id="typeChips"></div>
    </div>

    <button class="reset-btn" id="resetBtn" aria-label="Clear all filters">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor"
           stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 8a5 5 0 1 0 10 0A5 5 0 0 0 3 8zM8 5v3l2 2"/>
      </svg>
      Clear all filters
    </button>

  </aside>

  <!-- ─── Main ─────────────────────────────────────────────────── -->
  <main class="main">

    <div class="stats-bar" id="statsBar">
      <div class="stat"><span class="stat-val" id="s-papers">—</span><span class="stat-label">Papers</span></div>
      <div class="stat"><span class="stat-val" id="s-journals">—</span><span class="stat-label">Journals</span></div>
      <div class="stat"><span class="stat-val" id="s-institutions">—</span><span class="stat-label">Institutions</span></div>
      <div class="stat"><span class="stat-val" id="s-oa">—</span><span class="stat-label">Open access</span></div>
    </div>

    <div class="controls">
      <span class="results-label"><span id="filteredCount">—</span> results</span>
      <select class="sort-select" id="sortSelect" aria-label="Sort results">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="title-asc">Title A–Z</option>
      </select>
    </div>

    <div id="resultsList" role="list" aria-live="polite" aria-atomic="true"></div>
    <div class="pagination" id="pagination"></div>

  </main>
</div>

<footer class="footer" data-od-id="footer">
  <span>Vienna Research Radar · WWTF</span>
  <nav>
    <a href="index.html">Archive</a>
    &nbsp;·&nbsp;
    <a href="impressum.html">Impressum</a>
    &nbsp;·&nbsp;
    <a href="https://wwtf.at" rel="noopener">wwtf.at</a>
  </nav>
</footer>

<script>
const CSV_PATH = 'research-data.csv';
const PER_PAGE = 40;

const DATASET_HOSTS = ['zenodo','figshare','dryad','osf.io','data.mendeley','dataverse','tuwdata','tu wien research data'];
const PREPRINT_HOSTS = ['biorxiv','medrxiv','arxiv','research square','ssrn','preprints.org','chemrxiv','psyarxiv'];

function inferType(journal) {
  const j = journal.toLowerCase();
  if (DATASET_HOSTS.some(h => j.includes(h))) return 'dataset';
  if (PREPRINT_HOSTS.some(h => j.includes(h))) return 'preprint';
  return 'article';
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  let headers = [];
  let i = 0;
  function parseLine(line) {
    const fields = []; let cur = ''; let inQ = false;
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { fields.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    fields.push(cur.trim());
    return fields;
  }
  headers = parseLine(lines[0]);
  for (i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const fields = parseLine(lines[i]);
    const row = {};
    headers.forEach((h, idx) => { row[h] = (fields[idx] || '').replace(/^"|"$/g,'').trim(); });
    if (!row['Title']) continue;
    row['_type'] = inferType(row['Journal'] || '');
    const vf = row['Vienna Researchers'] || '';
    const instParens = [...vf.matchAll(/\(([^)]+)\)/g)].map(m => m[1].trim());
    row['_viennaNames'] = [...new Set(
      vf.split(/[;,]+/).map(s => s.replace(/\s*\([^)]*\)/g,'').trim()).filter(s => s.length > 2)
    )];
    const KNOWN_INST = ['Universität Wien','Medizinische Universität Wien','MedUni Wien','Technische Universität Wien','TU Wien','Wirtschaftsuniversität Wien','WU Wien','Veterinärmedizinische Universität Wien','Universität für Bodenkultur Wien','BOKU','Institute of Science and Technology Austria','ISTA','Austrian Academy of Sciences','ÖAW','Gregor Mendel Institute','GMI','IMBA','IMP','CeMM','Vienna BioCenter','Ludwig Boltzmann'];
    row['_institutions'] = instParens.length
      ? [...new Set(instParens)]
      : KNOWN_INST.filter(inst => (vf + ' ' + (row['Authors']||'')).includes(inst));
    rows.push(row);
  }
  return rows;
}

let allPapers = [];
let filtered = [];
let page = 1;
const activeFilters = { domain: new Set(), institution: new Set(), oa: new Set(), type: new Set() };

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return isNaN(dt) ? d : dt.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

const OA_COLORS = { gold:'#f59e0b', diamond:'#2dd4bf', green:'#22c55e', hybrid:'#a78bfa', closed:'#64748b' };

function renderAuthors(authorsStr, viennaNames) {
  const cleaned = authorsStr.replace(/\s*\([A-Z][^)]{4,}\)/g, '');
  if (!viennaNames || !viennaNames.length) return escHtml(cleaned);
  return cleaned.split(/,\s*/).map(name => {
    const t = name.trim();
    if (!t) return '';
    const isVienna = viennaNames.some(v => {
      if (!v) return false;
      const parts = v.split(/[\s,]+/).filter(p => p.length > 2);
      return parts.some(p => t.toLowerCase().includes(p.toLowerCase()));
    });
    return isVienna ? `<span class="vienna-author">${escHtml(t)}</span>` : escHtml(t);
  }).filter(Boolean).join(', ');
}

function renderList() {
  const list = document.getElementById('resultsList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><p class="empty-title">No results</p><p>Try adjusting your filters or search term.</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  const start = (page - 1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);
  list.innerHTML = slice.map(p => {
    const doi = p['DOI'] || '';
    const oa = (p['OA Status'] || 'closed').toLowerCase();
    const oaColor = OA_COLORS[oa] || '#64748b';
    const type = p['_type'];
    const typeLabel = type === 'dataset' ? 'dataset' : type === 'preprint' ? 'preprint' : 'article';
    const authors = p['Authors'] ? renderAuthors(p['Authors'], p['_viennaNames']) : '';
    const abstract = p['Abstract'] ? escHtml(p['Abstract']) : '';
    const titleEl = doi
      ? `<a href="${escHtml(doi)}" target="_blank" rel="noopener">${escHtml(p['Title'])}</a>`
      : escHtml(p['Title']);
    return `
      <article class="paper" role="listitem">
        <div class="paper-title">${titleEl}</div>
        <div class="paper-badges">
          <span class="oa-badge oa-${oa}">
            <span class="oa-dot" style="background:${oaColor}" aria-hidden="true"></span>${oa}
          </span>
          <span class="type-badge type-${type}">${typeLabel}</span>
          ${doi ? `<a class="doi-link" href="${escHtml(doi)}" target="_blank" rel="noopener" title="Open article">doi</a>` : ''}
        </div>
        ${authors ? `<div class="paper-authors">${authors}</div>` : ''}
        <div class="paper-meta">
          <span class="paper-journal">${escHtml(p['Journal'] || '')}</span>
          ${p['Domain'] ? `<span class="sep">·</span><span class="paper-domain-tag">${escHtml(p['Domain'])}</span>` : ''}
          ${p['Field'] && p['Field'] !== p['Domain'] ? `<span class="sep">·</span><span style="font-size:12px;color:var(--muted)">${escHtml(p['Field'])}</span>` : ''}
          ${p['Date'] ? `<span class="sep">·</span><span class="paper-date">${formatDate(p['Date'])}</span>` : ''}
        </div>
        ${abstract ? `<div class="paper-abstract" tabindex="0" role="button" aria-expanded="false"
          onclick="this.classList.toggle('expanded');this.setAttribute('aria-expanded',this.classList.contains('expanded'))"
          title="Click to expand">${abstract}</div>` : ''}
      </article>`;
  }).join('');
  renderPagination();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  const pages = [];
  pages.push(`<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''} aria-label="Previous page">‹</button>`);
  for (let p2 = 1; p2 <= total; p2++) {
    if (total <= 7 || Math.abs(p2 - page) <= 2 || p2 === 1 || p2 === total) {
      pages.push(`<button class="page-btn${p2===page?' active':''}" onclick="goPage(${p2})" aria-label="Page ${p2}">${p2}</button>`);
    } else if (Math.abs(p2 - page) === 3) {
      pages.push('<span style="color:var(--meta);padding:0 4px">…</span>');
    }
  }
  pages.push(`<button class="page-btn" onclick="goPage(${page+1})" ${page===total?'disabled':''} aria-label="Next page">›</button>`);
  pg.innerHTML = pages.join('');
}

function goPage(n) {
  page = n;
  renderList();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  filtered = allPapers.filter(p => {
    if (q) {
      const haystack = [p['Title'],p['Authors'],p['Abstract'],p['Journal'],p['Vienna Researchers']].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    if (activeFilters.domain.size && !activeFilters.domain.has(p['Domain'])) return false;
    if (activeFilters.institution.size && !p['_institutions'].some(i => activeFilters.institution.has(i))) return false;
    if (activeFilters.oa.size && !activeFilters.oa.has((p['OA Status']||'').toLowerCase())) return false;
    if (activeFilters.type.size && !activeFilters.type.has(p['_type'])) return false;
    return true;
  });
  if (sort === 'date-desc') filtered.sort((a,b) => (b['Date']||'').localeCompare(a['Date']||''));
  else if (sort === 'date-asc') filtered.sort((a,b) => (a['Date']||'').localeCompare(b['Date']||''));
  else if (sort === 'title-asc') filtered.sort((a,b) => (a['Title']||'').localeCompare(b['Title']||''));
  document.getElementById('filteredCount').textContent = filtered.length.toLocaleString();
  page = 1;
  renderList();
}

function buildChips(containerId, values, filterKey) {
  const el = document.getElementById(containerId);
  el.innerHTML = [...values].sort().map(v => {
    const dot = filterKey === 'oa' && OA_COLORS[v]
      ? `<span class="oa-dot" style="background:${OA_COLORS[v]}" aria-hidden="true"></span>` : '';
    return `<button class="chip" data-value="${escHtml(v)}" data-filter="${filterKey}"
      aria-pressed="false">${dot}${escHtml(v)}</button>`;
  }).join('');
  el.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.value;
      const fk = btn.dataset.filter;
      if (activeFilters[fk].has(val)) {
        activeFilters[fk].delete(val);
        btn.classList.remove('active');
        btn.setAttribute('aria-pressed','false');
      } else {
        activeFilters[fk].add(val);
        btn.classList.add('active');
        btn.setAttribute('aria-pressed','true');
      }
      applyFilters();
    });
  });
}

function buildUI(papers) {
  const domains      = new Set(papers.map(p => p['Domain']).filter(Boolean));
  const institutions = new Set(papers.flatMap(p => p['_institutions']));
  const oaStatuses   = new Set(papers.map(p => (p['OA Status']||'').toLowerCase()).filter(Boolean));
  const types        = new Set(papers.map(p => p['_type']));

  buildChips('domainChips',      domains,      'domain');
  buildChips('institutionChips', institutions, 'institution');
  buildChips('oaChips',          oaStatuses,   'oa');
  buildChips('typeChips',        types,         'type');

  const openPct = Math.round(
    papers.filter(p => ['gold','diamond','green'].includes((p['OA Status']||'').toLowerCase())).length / papers.length * 100
  );
  document.getElementById('s-papers').textContent = papers.length.toLocaleString();
  document.getElementById('s-journals').textContent = new Set(papers.map(p=>p['Journal']).filter(Boolean)).size;
  document.getElementById('s-institutions').textContent = institutions.size;
  document.getElementById('s-oa').textContent = openPct + '%';
  document.getElementById('totalCount').textContent = papers.length.toLocaleString();
}

document.getElementById('searchInput').addEventListener('input', () => applyFilters());
document.getElementById('sortSelect').addEventListener('change', () => applyFilters());
document.getElementById('resetBtn').addEventListener('click', () => {
  activeFilters.domain.clear(); activeFilters.institution.clear();
  activeFilters.oa.clear(); activeFilters.type.clear();
  document.querySelectorAll('.chip.active').forEach(c => {
    c.classList.remove('active'); c.setAttribute('aria-pressed','false');
  });
  document.getElementById('searchInput').value = '';
  applyFilters();
});

fetch(CSV_PATH)
  .then(r => { if (!r.ok) throw new Error('CSV not found'); return r.text(); })
  .then(text => {
    allPapers = parseCSV(text);
    buildUI(allPapers);
    applyFilters();
  })
  .catch(() => {
    document.getElementById('resultsList').innerHTML =
      '<div class="empty"><p class="empty-title">Dataset unavailable</p><p>The research CSV could not be loaded.</p></div>';
  });
</script>
</body>
